<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS Walkthrough</title>
    <style>
      /* Remove all default spacing so the canvas fills the entire viewport. */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden; /* prevent scrollbars that would shrink the canvas */
        background: #000;
      }
      /* The canvas element that Bevy attaches to via Window::canvas.
         `fit_canvas_to_parent: true` in main.rs resizes it dynamically, but
         the CSS below ensures it fills the parent from the start. */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Simple loading overlay shown until the WASM module is ready. */
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ccc;
        font-family: monospace;
        font-size: 1.2rem;
        background: #111;
      }
      #loading.hidden {
        display: none;
      }

      /* Click-to-start hint shown over the canvas before pointer lock. */
      #hint {
        position: absolute;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-family: monospace;
        font-size: 0.9rem;
        text-align: center;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <!-- Bevy targets this element via `canvas: Some("#bevy-canvas")` in main.rs. -->
    <canvas id="bevy-canvas"></canvas>

    <div id="loading">Loading…</div>
    <div id="hint">Click to capture mouse &nbsp;|&nbsp; WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Esc — Release</div>

    <script type="module">
      // `fps_walkthrough.js` is the wasm-bindgen JS glue generated by the build step.
      // It lives alongside this HTML in the dist/ directory.
      import init from "./fps_walkthrough.js";

      const loading = document.getElementById("loading");

      try {
        // `init()` fetches fps_walkthrough_bg.wasm, compiles it, and starts the app.
        await init();
      } catch (err) {
        loading.textContent = "Failed to load: " + err;
        console.error(err);
        throw err;
      }

      loading.classList.add("hidden");

      // Hide the hint once the user locks the pointer.
      const hint = document.getElementById("hint");
      document.addEventListener("pointerlockchange", () => {
        hint.style.display = document.pointerLockElement ? "none" : "";
      });
    </script>
  </body>
</html>
